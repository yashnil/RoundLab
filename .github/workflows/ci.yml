name: CI

on:
  push:
    branches: ["main", "ui/**", "feat/**", "fix/**"]
  pull_request:
    branches: ["main"]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    env:
      # Dummy values so env-validated settings don't crash on import
      SUPABASE_URL: "https://placeholder.supabase.co"
      SUPABASE_KEY: "placeholder-key"
      OPENAI_API_KEY: "sk-placeholder"
      CORS_ORIGINS: "http://localhost:3000"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies (including PyMuPDF and python-docx)
        run: pip install -r requirements.txt

      - name: Run backend tests
        run: |
          # pytest-socket is used to block unintended network in tests.
          # Individual tests that need real HTTP calls use @pytest.mark.allow_hosts.
          pip install pytest-socket 2>/dev/null || true
          pytest \
            --tb=short \
            --no-header \
            -q \
            --disable-socket \
            --allow-hosts=localhost,127.0.0.1 \
            tests/ \
            2>&1
        continue-on-error: false

  frontend:
    name: Frontend tests + TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run frontend tests
        run: npx jest --passWithNoTests --forceExit
        env:
          CI: "true"

  lint:
    name: Python import / syntax check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify all modules import without error
        run: |
          python -c "
          import sys, os
          os.environ.update({
            'SUPABASE_URL': 'https://placeholder.supabase.co',
            'SUPABASE_KEY': 'placeholder',
            'OPENAI_API_KEY': 'sk-placeholder',
            'CORS_ORIGINS': 'http://localhost:3000',
          })
          import app.models.citation
          import app.models.evidence_library
          import app.models.research
          import app.services.citation_normalizer
          import app.services.citation_renderers
          import app.services.evidence_library_service
          import app.services.library_export
          print('All modules imported successfully')
          "
        env:
          SUPABASE_URL: "https://placeholder.supabase.co"
          SUPABASE_KEY: "placeholder"
          OPENAI_API_KEY: "sk-placeholder"
          CORS_ORIGINS: "http://localhost:3000"
